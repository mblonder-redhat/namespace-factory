apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespace-factory
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mblonder-redhat/namespace-factory.git
    targetRevision: HEAD
    path: tenants/
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
